type Creator @entity {
  id: ID!
  nickname: String! @index
  totalUsdcTipsReceived: BigDecimal!
  totalEurcTipsReceived: BigDecimal!
  createdAt: BigInt!
  usdcTips: [UsdcTip!]! @derivedFrom(field: "creator")
  eurcTips: [EurcTip!]! @derivedFrom(field: "creator")
}

type UsdcTip @entity {
  id: ID!
  creator: Creator!
  senderName: String
  amountUSDC: BigDecimal!
  message: String
  timestamp: BigInt!
}

type EurcTip @entity {
  id: ID!
  creator: Creator!
  senderName: String
  amountEURC: BigDecimal!
  message: String
  timestamp: BigInt!
}
